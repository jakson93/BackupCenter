version: "3.3"

services:
  backup-center-backend:
    build:
      context: ./backend
    container_name: backup-center-backend
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - /home/ftpmov/BKEQUIPAMENTOS:/home/ftpmov/BKEQUIPAMENTOS
      - ./data:/app/data
    environment:
      - API_PORT=${API_PORT:-3001}
      - FTP_BACKUP_ROOT=${FTP_BACKUP_ROOT:-/home/ftpmov/BKEQUIPAMENTOS}
      - DATABASE_PATH=${DATABASE_PATH:-/app/data/backup-center.sqlite}
      - SCAN_INTERVAL_SECONDS=${SCAN_INTERVAL_SECONDS:-60}
      - SERVER_NAME=${SERVER_NAME:-Ubuntu FTP Server}
      - SERVER_IP=${SERVER_IP:-127.0.0.1}
      - DEFAULT_BACKUP_FREQUENCY_HOURS=${DEFAULT_BACKUP_FREQUENCY_HOURS:-24}
      - STORAGE_WARNING_PERCENT=${STORAGE_WARNING_PERCENT:-80}
      - STORAGE_CRITICAL_PERCENT=${STORAGE_CRITICAL_PERCENT:-90}
      - "MASTER_USER=${MASTER_USER:-mov}"
      - "MASTER_PASSWORD=${MASTER_PASSWORD:-m0V@2ooK#2031}"

  backup-center-frontend:
    build:
      context: ./frontend
    container_name: backup-center-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backup-center-backend
